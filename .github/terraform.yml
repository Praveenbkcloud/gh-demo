name: Dynamic Terraform Pipeline

on:
  push:
    branches: [main]

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: set
        run: |
          echo "Detecting changed infra folders..."

          CHANGED=$(git diff --name-only HEAD~1 HEAD || git ls-files)

          echo "$CHANGED"

          DIRS=$(echo "$CHANGED" | grep '^infra/' | cut -d/ -f2 | sort -u)

          ARRAY=()
          for dir in $DIRS; do
            if [ -n "$dir" ]; then
              ARRAY+=("\"$dir\"")
            fi
          done

          JSON="[$(IFS=,; echo "${ARRAY[*]}")]"

          echo "matrix=$JSON" >> $GITHUB_OUTPUT
          echo "Final matrix: $JSON"

  terraform:
    needs: detect
    if: needs.detect.outputs.matrix != '[]'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        dir: ${{ fromJson(needs.detect.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Debug
        run: echo "Running for ${{ matrix.dir }}"

      - name: Terraform Init
        working-directory: infra/${{ matrix.dir }}
        run: terraform init

      - name: Terraform Plan
        working-directory: infra/${{ matrix.dir }}
        run: terraform plan
