name: Dynamic Terraform Pipeline

on:
  push:
    branches:
      - main

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      dirs: ${{ steps.set-matrix.outputs.dirs }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed folders
        id: set-matrix
        run: |
          echo "===== Detecting Changes ====="

          # Handle first commit
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          else
            CHANGED_FILES=$(git ls-files)
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Extract only infra folders
          DIRS=$(echo "$CHANGED_FILES" | grep '^infra/' | cut -d/ -f2 | sort -u)

          echo "Raw dirs:"
          echo "$DIRS"

          # Convert to JSON and remove empty values
          JSON=$(printf '%s\n' $DIRS | jq -R . | jq -s 'map(select(length > 0))')

          echo "Final JSON:"
          echo "$JSON"

          # Set output safely
          if [ "$JSON" = "[]" ] || [ -z "$JSON" ]; then
            echo "dirs=[]" >> $GITHUB_OUTPUT
          else
            echo "dirs=$JSON" >> $GITHUB_OUTPUT
          fi

      - name: Debug output
        run: echo "Dirs = ${{ steps.set-matrix.outputs.dirs }}"

  terraform:
    needs: detect-changes
    if: needs.detect-changes.outputs.dirs != '[]'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        dir: ${{ fromJson(needs.detect-changes.outputs.dirs) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug matrix value
        run: echo "Running for directory: ${{ matrix.dir }}"

      - name: Ensure directory exists
        run: |
          if [ ! -d "infra/${{ matrix.dir }}" ]; then
            echo "Directory infra/${{ matrix.dir }} does not exist"
            exit 1
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra/${{ matrix.dir }}
        run: terraform init

      - name: Terraform Validate
        working-directory: infra/${{ matrix.dir }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: infra/${{ matrix.dir }}
        run: terraform plan